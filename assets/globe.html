<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    html,body,#globe,canvas{width:100%;height:100%;margin:0;overflow:hidden;background:#010b12;touch-action:none}
  </style>
</head>
<body>
  <div id="globe"></div>
  <script>
    (function () {
      const host = document.getElementById('globe');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x010b12);

      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(0, 0, 3.72);

      const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      host.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0x8fbfff, 1.15));
      const sun = new THREE.DirectionalLight(0xffffff, 1.65);
      sun.position.set(3, 2, 4);
      scene.add(sun);

      const world = new THREE.Group();
      scene.add(world);

      const fallbackMaterial = new THREE.MeshPhongMaterial({
        color:0x197bb5,
        emissive:0x03182a,
        emissiveIntensity:0.5,
        shininess:18
      });
      const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 96), fallbackMaterial);
      world.add(earth);

      const atmosphere = new THREE.Mesh(
        new THREE.SphereGeometry(1.09, 64, 64),
        new THREE.ShaderMaterial({
          vertexShader:'varying vec3 n;void main(){n=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
          fragmentShader:'varying vec3 n;void main(){float i=pow(0.72-dot(n,vec3(0.0,0.0,1.0)),3.0);gl_FragColor=vec4(0.10,0.55,1.0,1.0)*i;}',
          blending:THREE.AdditiveBlending,
          side:THREE.BackSide,
          transparent:true,
          depthWrite:false
        })
      );
      world.add(atmosphere);

      const starPositions=[];
      for(let i=0;i<650;i++){
        const r=8+Math.random()*12, a=Math.random()*Math.PI*2, z=(Math.random()*2-1)*r;
        const q=Math.sqrt(Math.max(0,r*r-z*z));
        starPositions.push(q*Math.cos(a),q*Math.sin(a),z);
      }
      const starGeometry=new THREE.BufferGeometry();
      starGeometry.setAttribute('position',new THREE.Float32BufferAttribute(starPositions,3));
      scene.add(new THREE.Points(starGeometry,new THREE.PointsMaterial({color:0x8fbfff,size:.025,transparent:true,opacity:.72}))); 

      const textureLoader=new THREE.TextureLoader();
      function loadTexture(url){
        return new Promise(function(resolve,reject){
          textureLoader.load(url,function(texture){texture.colorSpace=THREE.SRGBColorSpace;resolve(texture);},undefined,reject);
        });
      }
      let selectedUtcHour=null;
      let globeMaterialRef=null;
      const markerGroups=[];
      function activeUtcHour(){
        const now=new Date();
        return selectedUtcHour===null ? now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600 : selectedUtcHour;
      }
      function currentSunDirection(){
        const now=new Date();
        const utc=activeUtcHour();
        const start=Date.UTC(now.getUTCFullYear(),0,0);
        const day=Math.floor((now.getTime()-start)/86400000);
        const declination=23.44*Math.sin((2*Math.PI/365)*(day-81));
        const subsolarLongitude=180-utc*15;
        return globePosition(declination,subsolarLongitude,1).normalize();
      }
      Promise.all([
        loadTexture('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
        loadTexture('https://unpkg.com/three-globe/example/img/earth-night.jpg')
      ]).then(function(textures){
        const globeMaterial=new THREE.ShaderMaterial({
          uniforms:{
            dayMap:{value:textures[0]},
            nightMap:{value:textures[1]},
            sunDirection:{value:currentSunDirection()}
          },
          vertexShader:'varying vec2 vUv;varying vec3 vObjectNormal;void main(){vUv=uv;vObjectNormal=normalize(normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
          fragmentShader:'uniform sampler2D dayMap;uniform sampler2D nightMap;uniform vec3 sunDirection;varying vec2 vUv;varying vec3 vObjectNormal;void main(){float sunlight=dot(normalize(vObjectNormal),normalize(sunDirection));float daylight=smoothstep(-0.16,0.18,sunlight);vec3 dayColor=texture2D(dayMap,vUv).rgb;vec3 nightColor=texture2D(nightMap,vUv).rgb*1.28;vec3 color=mix(nightColor,dayColor,daylight);float rim=pow(1.0-abs(dot(normalize(vObjectNormal),vec3(0.0,0.0,1.0))),3.0);color+=vec3(0.02,0.16,0.32)*rim;gl_FragColor=vec4(color,1.0);}'
        });
        earth.material=globeMaterial;
        globeMaterialRef=globeMaterial;
        setInterval(function(){globeMaterial.uniforms.sunDirection.value.copy(currentSunDirection());},30000);
      }).catch(function(){fallbackMaterial.color.set(0x197bb5);});

      const places = [
        {name:'Chennai',region:'Tamil Nadu, India',stories:12,lon:80.2707,lat:13.0827,hours:[[0,24]]},
        {name:'Andhra Pradesh',region:'India',stories:10,lon:80.6480,lat:16.5062,hours:[[0,24]]},
        {name:'London',region:'England, United Kingdom',stories:9,lon:-0.1276,lat:51.5072,hours:[[0,18]]},
        {name:'Tokyo',region:'Tokyo Prefecture, Japan',stories:6,lon:139.6917,lat:35.6895,hours:[[0,16],[22,24]]},
        {name:'New Delhi',region:'Delhi, India',stories:8,lon:77.2090,lat:28.6139,hours:[[4,24]]}
      ];
      const markerMeshes = [];

      function globePosition(lat, lon, radius) {
        const phi = (90-lat) * Math.PI/180;
        const theta = (lon+180) * Math.PI/180;
        return new THREE.Vector3(
          -radius*Math.sin(phi)*Math.cos(theta),
          radius*Math.cos(phi),
          radius*Math.sin(phi)*Math.sin(theta)
        );
      }

      function glowSprite(color) {
        const canvas=document.createElement('canvas');
        canvas.width=128; canvas.height=128;
        const ctx=canvas.getContext('2d');
        const gradient=ctx.createRadialGradient(64,64,2,64,64,62);
        gradient.addColorStop(0,'rgba(255,255,255,1)');
        gradient.addColorStop(.12,color);
        gradient.addColorStop(.28,color.replace('1)', '.55)'));
        gradient.addColorStop(.55,color.replace('1)', '.15)'));
        gradient.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gradient;ctx.fillRect(0,0,128,128);
        const texture=new THREE.CanvasTexture(canvas);
        texture.colorSpace=THREE.SRGBColorSpace;
        const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:texture,transparent:true,depthTest:false}));
        sprite.scale.set(.32,.32,1);
        return sprite;
      }

      const pulseMarkers=[];
      function addPlaceMarker(place){
        const group=new THREE.Group();
        group.position.copy(globePosition(place.lat,place.lon,1.035));
        const isAlert=place.name==='New Delhi';
        const glow=glowSprite(isAlert?'rgba(255,72,72,1)':'rgba(30,145,255,1)');
        glow.userData=place;
        markerMeshes.push(glow);
        pulseMarkers.push(glow);
        group.add(glow);
        const touchTarget=new THREE.Mesh(
          new THREE.SphereGeometry(.15,16,16),
          new THREE.MeshBasicMaterial({transparent:true,opacity:.001,depthTest:false})
        );
        touchTarget.userData=place;
        markerMeshes.push(touchTarget);
        group.add(touchTarget);
        group.userData.place=place;
        markerGroups.push(group);
        world.add(group);
        return group;
      }
      places.forEach(addPlaceMarker);

      function markerIsActive(place,hour){
        return place.hours.some(function(range){return hour>=range[0]&&hour<range[1];});
      }
      function updateTimeLayer(){
        const hour=activeUtcHour();
        if(globeMaterialRef)globeMaterialRef.uniforms.sunDirection.value.copy(currentSunDirection());
        markerGroups.forEach(function(group){group.visible=markerIsActive(group.userData.place,hour);});
      }
      window.setGeotixHour=function(hour){
        selectedUtcHour=typeof hour==='number' ? ((hour%24)+24)%24 : null;
        updateTimeLayer();
      };
      // Keep navigation in latitude/longitude space. This guarantees that
      // north stays at the top and prevents the globe from accumulating roll.
      let centerLat=18, centerLon=78, targetView=null;
      function clampLat(lat){return Math.max(-89,Math.min(89,lat));}
      function normalizeLon(lon){return ((lon+180)%360+360)%360-180;}
      function northUpQuaternion(lat,lon){
        const front=globePosition(lat,lon,1).normalize();
        let north=new THREE.Vector3(0,1,0).sub(front.clone().multiplyScalar(front.y));
        if(north.lengthSq()<1e-8)north=new THREE.Vector3(0,0,lat>=0?-1:1);
        north.normalize();
        const east=new THREE.Vector3().crossVectors(north,front).normalize();
        const basis=new THREE.Matrix4().makeBasis(east,north,front);
        return new THREE.Quaternion().setFromRotationMatrix(basis).invert();
      }
      function applyView(){
        world.quaternion.copy(northUpQuaternion(centerLat,centerLon));
      }
      window.focusGeotixPlace=function(name){
        const place=places.find(function(item){return item.name.toLowerCase()===String(name).toLowerCase();});
        if(!place)return;
        focusPlace(place);
      };
      function focusPlace(place){
        targetView={lat:clampLat(place.lat),lon:normalizeLon(place.lon)};
        const hour=activeUtcHour();
        const timeFactor=.62+.38*Math.abs(Math.sin((hour+place.lon/15)*Math.PI/12));
        const count=Math.max(1,Math.round(place.stories*timeFactor));
        if(window.Geotix)window.Geotix.postMessage([place.name,place.region,count].join('|'));
      }
      let searchBusy=false;
      window.searchGeotixPlace=async function(query){
        if(searchBusy)return;
        searchBusy=true;
        try{
          const exact=places.find(function(item){
            const a=item.name.toLowerCase().replace(/[^a-z0-9]/g,'');
            const b=String(query).toLowerCase().replace(/[^a-z0-9]/g,'');
            return a===b;
          });
          if(exact){focusPlace(exact);return;}
          const url='https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&addressdetails=1&q='+encodeURIComponent(query);
          const response=await fetch(url,{headers:{'Accept-Language':'en'}});
          if(!response.ok)throw new Error('Search service unavailable');
          const results=await response.json();
          if(!results.length){
            if(window.GeotixStatus)window.GeotixStatus.postMessage('Location not found. Try a country, state, capital, city or district name.');
            return;
          }
          const result=results[0], address=result.address||{};
          const name=address.city||address.town||address.village||address.state||address.country||result.display_name.split(',')[0];
          const region=[address.state,address.country].filter(function(v,i,a){return v&&a.indexOf(v)===i&&v!==name;}).join(', ')||'Searched location';
          const place={
            name:name,
            region:region,
            stories:Math.max(3,Math.min(18,Math.round(Number(result.importance||.35)*20))),
            lon:Number(result.lon),
            lat:Number(result.lat),
            hours:[[0,24]]
          };
          places.push(place);
          addPlaceMarker(place);
          updateTimeLayer();
          focusPlace(place);
        }catch(error){
          if(window.GeotixStatus)window.GeotixStatus.postMessage('Could not search right now. Check internet and try again.');
        }finally{searchBusy=false;}
      };
      updateTimeLayer();

      applyView();

      let dragging=false, moved=false, lastX=0, lastY=0, pinchDistance=0;
      const activePointers=new Set();
      renderer.domElement.addEventListener('pointerdown',function(e){
        if(e.pointerType==='touch')return;
        targetView=null;
        activePointers.add(e.pointerId);
        dragging=activePointers.size===1;
        moved=false; lastX=e.clientX; lastY=e.clientY;
        renderer.domElement.setPointerCapture(e.pointerId);
      });
      renderer.domElement.addEventListener('pointermove',function(e){
        if(e.pointerType==='touch')return;
        if(!dragging||activePointers.size!==1)return;
        const dx=e.clientX-lastX, dy=e.clientY-lastY;
        if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
        centerLon=normalizeLon(centerLon-dx*.28);
        centerLat=clampLat(centerLat+dy*.20);
        applyView();
        lastX=e.clientX; lastY=e.clientY;
      });
      renderer.domElement.addEventListener('pointerup',function(e){
        if(e.pointerType==='touch')return;
        activePointers.delete(e.pointerId);
        dragging=false;
        if(!moved&&activePointers.size===0)pickMarker(e.clientX,e.clientY);
      });
      renderer.domElement.addEventListener('pointercancel',function(e){activePointers.delete(e.pointerId);dragging=false;});
      renderer.domElement.addEventListener('wheel',function(e){
        e.preventDefault();
        camera.position.z=Math.max(2.25,Math.min(6.0,camera.position.z+e.deltaY*.002));
      },{passive:false});
      renderer.domElement.addEventListener('touchstart',function(e){
        e.preventDefault();
        targetView=null;
        moved=false;
        if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
        if(e.touches.length===2){dragging=false;pinchDistance=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
      },{passive:false});
      renderer.domElement.addEventListener('touchmove',function(e){
        e.preventDefault();
        if(e.touches.length===1&&dragging){
          const touch=e.touches[0],dx=touch.clientX-lastX,dy=touch.clientY-lastY;
          if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
          centerLon=normalizeLon(centerLon-dx*.32);
          centerLat=clampLat(centerLat+dy*.24);
          applyView();
          lastX=touch.clientX;lastY=touch.clientY;
        }else if(e.touches.length===2){
          dragging=false;
          const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
          camera.position.z=Math.max(2.25,Math.min(6.0,camera.position.z-(d-pinchDistance)*.008));
          pinchDistance=d;
        }
      },{passive:false});
      renderer.domElement.addEventListener('touchend',function(e){
        if(e.touches.length===0){
          dragging=false;
          if(!moved&&e.changedTouches.length)pickMarker(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
        }else if(e.touches.length===1){
          dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
        }
      },{passive:false});

      const raycaster=new THREE.Raycaster();
      const pointer=new THREE.Vector2();
      function pickMarker(x,y){
        const rect=renderer.domElement.getBoundingClientRect();
        pointer.x=((x-rect.left)/rect.width)*2-1;
        pointer.y=-((y-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(pointer,camera);
        const hits=raycaster.intersectObjects(markerMeshes,false);
        if(!hits.length)return;
        const p=hits[0].object.userData;
        const hour=activeUtcHour();
        const timeFactor=.62+.38*Math.abs(Math.sin((hour+p.lon/15)*Math.PI/12));
        const count=Math.max(1,Math.round(p.stories*timeFactor));
        focusPlace(p);
        if(window.GeotixStory)window.GeotixStory.postMessage([p.name,p.region,count].join('|'));
      }

      function resize(){
        const w=Math.max(1,host.clientWidth), h=Math.max(1,host.clientHeight);
        renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
      }
      new ResizeObserver(resize).observe(host); resize();
      function animate(){
        requestAnimationFrame(animate);
        if(targetView){
          const lonDelta=normalizeLon(targetView.lon-centerLon);
          const latDelta=targetView.lat-centerLat;
          centerLon=normalizeLon(centerLon+lonDelta*.10);
          centerLat=clampLat(centerLat+latDelta*.10);
          applyView();
          if(Math.abs(lonDelta)<.03&&Math.abs(latDelta)<.03){
            centerLon=targetView.lon;centerLat=targetView.lat;targetView=null;applyView();
          }
        }
        const pulse=1+Math.sin(performance.now()*.004)*.13;
        pulseMarkers.forEach(function(marker){marker.scale.set(.32*pulse,.32*pulse,1);});
        renderer.render(scene,camera);
      }
      animate();
    })();
  </script>
</body>
</html>
